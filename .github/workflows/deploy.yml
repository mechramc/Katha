name: KATHA Deploy

on:
  workflow_run:
    workflows: ['KATHA CI']
    types: [completed]
    branches: [main]

# Prevent concurrent deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Gate: Only deploy if CI succeeded
  verify-ci:
    name: 'Verify CI Green'
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed
        run: echo "CI verified green — deploying from ${{ github.event.workflow_run.head_sha }}"

  deploy-vault:
    name: 'Deploy Vault to Railway'
    needs: verify-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Vault
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service vault -d
        working-directory: vault
      - name: Verify Vault health
        run: |
          sleep 15
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://murailabs.com/katha/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Vault deployed and healthy"
              exit 0
            fi
            echo "Waiting for Vault... attempt $i (status: $STATUS)"
            sleep 10
          done
          echo "Vault health check failed after deploy"
          exit 1

  deploy-engine:
    name: 'Deploy Engine to Railway'
    needs: verify-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Engine
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service engine -d
        working-directory: engine
      - name: Verify Engine health
        run: |
          sleep 15
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://murailabs.com/katha/engine/health)
            if [ "$STATUS" = "200" ]; then
              echo "Engine deployed and healthy"
              exit 0
            fi
            echo "Waiting for Engine... attempt $i (status: $STATUS)"
            sleep 10
          done
          echo "Engine health check failed after deploy"
          exit 1

  deploy-dashboard:
    name: 'Deploy Dashboard to Cloudflare Pages'
    needs: verify-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build dashboard
        working-directory: dashboard
        env:
          VITE_BASE_PATH: /katha/
          VITE_VAULT_URL: /katha/api
          VITE_ENGINE_URL: /katha/engine
        run: |
          npm install
          npm run build
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dashboard/dist --project-name katha-dashboard --branch main

  post-deploy-verify:
    name: 'Post-Deploy: Smoke Test'
    needs: [deploy-vault, deploy-engine, deploy-dashboard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Verify all services healthy
        run: |
          echo "=== Post-Deploy Smoke Test ==="

          # Vault health
          echo -n "Vault: "
          curl -sf https://murailabs.com/katha/api/health && echo " OK" || echo " FAILED"

          # Engine health
          echo -n "Engine: "
          curl -sf https://murailabs.com/katha/engine/health && echo " OK" || echo " FAILED"

          # Dashboard loads
          echo -n "Dashboard: "
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://murailabs.com/katha/)
          if [ "$STATUS" = "200" ]; then echo "OK"; else echo "FAILED (status: $STATUS)"; fi

          echo ""
          echo "=== Smoke Test Complete ==="

      - name: Verify no secrets exposed
        run: |
          BODY=$(curl -s https://murailabs.com/katha/api/health)
          if echo "$BODY" | grep -i "key\|secret\|password\|pem"; then
            echo "Possible secret leak in health endpoint"
            exit 1
          fi
          echo "No secrets in health response"

      - name: Verify revocation latency
        run: |
          TIME=$(curl -s -o /dev/null -w "%{time_total}" https://murailabs.com/katha/api/health)
          echo "Response time: ${TIME}s"
          python3 -c "assert float('$TIME') < 2.0, 'Too slow: ${TIME}s'"
          echo "Response time acceptable"
